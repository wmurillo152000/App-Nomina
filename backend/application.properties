# CORS Configuration
spring.web.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,https://giving-simplicity-production-62a6.up.railway.app}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
